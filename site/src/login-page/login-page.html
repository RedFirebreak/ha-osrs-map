<div class="login__container rsborder rsbackground">
  <men-input
    class="login__name"
    input-id="username"
    placeholder-text="Username"
    input-label="Username"
  ></men-input>
  <men-input
    class="login__token"
    max-length="128"
    input-id="password"
    placeholder-text="Password"
    input-label="Password"
    type-password
  ></men-input>
  <button class="login__button men-button">Login</button>
  <div class="login__error validation-error"></div>
  <div class="login__discord-divider" style="display:none;"></div>
  <button class="login__discord-button men-button" style="display:none;">
    <img src="/images/discord-light.png" alt="Discord" class="login__discord-icon">
    Login with Discord
  </button>
</div>
