<div class="setup-page__container rsborder rsbackground">
  <h2>Initial Setup</h2>
  <p>Create the first admin account to get started.</p>
  <men-input
    class="setup-page__username"
    input-id="setupUsername"
    placeholder-text="Admin username"
    input-label="Username"
  ></men-input>
  <men-input
    class="setup-page__password"
    max-length="128"
    input-id="setupPassword"
    placeholder-text="Password (min 8 characters)"
    input-label="Password"
    type-password
  ></men-input>
  <men-input
    class="setup-page__password-confirm"
    max-length="128"
    input-id="setupPasswordConfirm"
    placeholder-text="Confirm password"
    input-label="Confirm Password"
    type-password
  ></men-input>
  <button class="setup-page__submit men-button">Create Admin Account</button>
  <div class="setup-page__error validation-error"></div>
</div>
