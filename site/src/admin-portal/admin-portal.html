<div class="admin-portal__container rsborder rsbackground">
  <h2>Admin Portal</h2>

  <div class="admin-portal__section">
    <h3>Users</h3>
    <div class="admin-portal__user-list"></div>

    <div class="admin-portal__create-user rsborder-tiny rsbackground">
      <h4>Create New User</h4>
      <men-input class="admin-portal__new-username" input-id="newUsername" placeholder-text="Username" input-label="Username"></men-input>
      <men-input class="admin-portal__new-password" max-length="128" input-id="newPassword" placeholder-text="Password" input-label="Password" type-password></men-input>
      <div class="admin-portal__role-select">
        <label>Role:</label>
        <select class="admin-portal__role-dropdown">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button class="men-button admin-portal__create-btn">Create User</button>
      <div class="admin-portal__create-error validation-error"></div>
    </div>
  </div>

  <div class="admin-portal__section">
    <h3>Audit Log</h3>
    <div class="admin-portal__audit-log"></div>
  </div>
</div>
