version: "3.8"
services:
  postgres:
    image: postgres:17
    restart: always
    container_name: group-ironmen-tracker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: groupironman
    ports:
      - 5432:5432
    volumes:
      - ./pg-data:/var/lib/postgresql/data
      - ./server/src/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
